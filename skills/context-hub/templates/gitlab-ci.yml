# ── GitLab CI/CD for context-hub ──
#
# 两类任务：
#   1. Webhook 触发：各服务仓库代码变更时，自动更新 topology
#   2. 定时任务：每日全量扫描、每周一致性检查

stages:
  - sync
  - validate

# ── 变量 ──
variables:
  GIT_AUTHOR_NAME: "context-hub-bot"
  GIT_AUTHOR_EMAIL: "context-hub-bot@internal"
  GIT_COMMITTER_NAME: "context-hub-bot"
  GIT_COMMITTER_EMAIL: "context-hub-bot@internal"

# ── Webhook 触发：代码变更 → 更新拓扑 ──
sync-on-webhook:
  stage: sync
  rules:
    - if: $TRIGGER_REPO && $TRIGGER_BRANCH  # 由 GitLab Webhook 触发时传入 repo URL 与 branch
  script:
    - python3 scripts/refresh_context.py . --sync-gitlab --gitlab-url "$TRIGGER_REPO" --gitlab-branch "$TRIGGER_BRANCH" --auto-commit --auto-push
  tags:
    - shared

# ── 每日全量扫描（兜底）──
nightly-full-sync:
  stage: sync
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "nightly"
  script:
    - python3 scripts/refresh_context.py . --sync-gitlab --sync-ones --auto-commit --auto-push
  tags:
    - shared

# ── 每周一致性检查 ──
weekly-consistency-check:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "weekly"
  script:
    - python3 scripts/check_consistency.py
    - python3 scripts/check_stale.py --warn-days=90
  allow_failure: true  # 不阻塞，仅报告
  tags:
    - shared

# ── MR/Push 时的格式检查 ──
validate-on-push:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - python3 scripts/check_consistency.py
  tags:
    - shared
