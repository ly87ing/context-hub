# ── GitLab CI/CD for context-hub ──
#
# 两类任务：
#   1. Webhook 触发：各服务仓库代码变更时，自动更新 topology
#   2. 定时任务：每日全量扫描、每周一致性检查

stages:
  - sync
  - validate

# ── 变量 ──
variables:
  GIT_AUTHOR_NAME: "context-hub-bot"
  GIT_AUTHOR_EMAIL: "context-hub-bot@internal"
  GIT_COMMITTER_NAME: "context-hub-bot"
  GIT_COMMITTER_EMAIL: "context-hub-bot@internal"

# ── Webhook 触发：代码变更 → 更新拓扑 ──
sync-on-webhook:
  stage: sync
  rules:
    - if: $TRIGGER_REPO  # 由 GitLab Webhook 触发时传入仓库名
  script:
    - pip install pyyaml requests
    - python scripts/sync_topology.py --repo=$TRIGGER_REPO
  tags:
    - shared

# ── 每日全量扫描（兜底）──
nightly-full-sync:
  stage: sync
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "nightly"
  script:
    - pip install pyyaml requests
    - python scripts/sync_topology.py --full
  tags:
    - shared

# ── 每周一致性检查 ──
weekly-consistency-check:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "weekly"
  script:
    - pip install pyyaml
    - python scripts/check_consistency.py
    - python scripts/check_stale.py --warn-days=90
  allow_failure: true  # 不阻塞，仅报告
  tags:
    - shared

# ── MR/Push 时的格式检查 ──
validate-on-push:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - pip install pyyaml
    - python scripts/check_consistency.py
  tags:
    - shared
